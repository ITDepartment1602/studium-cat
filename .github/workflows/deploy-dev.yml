name: Deploy and Find Files

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to FTP ROOT to find actual location
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        timeout: 120000
        server-dir: ./
        local-dir: ./
        state-name: .ftp-deploy-sync-state.json
        exclude: |
          **/.git
          **/.git/**
          **/.github
          **/.github/**
          **/.gitignore
    
    - name: Instructions
      run: |
        echo "=============================================="
        echo "DIAGNOSTIC DEPLOYMENT COMPLETE"
        echo "=============================================="
        echo ""
        echo "Now check File Manager:"
        echo "1. Go to File Manager"
        echo "2. Look at the ROOT directory"
        echo "3. Find where these folders appeared:"
        echo "   - admin/"
        echo "   - student/"
        echo "   - img/"
        echo "   - Look for 'index.php'"
        echo ""
        echo "Report back with:"
        echo "- What folders/files do you see in File Manager ROOT?"
        echo "- Where did the 'admin' folder appear?"
        echo "=============================================="