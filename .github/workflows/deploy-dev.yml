name: Deploy Dev Branch to dev.studium.cat

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
    
    - name: Prepare deployment files
      run: |
        # Remove development files that shouldn't be deployed
        rm -rf .git .github .gitignore
        rm -f README.md
        rm -f *.sql
        rm -f tmp_*.txt
        rm -f .env.local
        rm -f config_backup.php
        rm -f REFACTORING_GUIDE.md
        # Show what we're deploying
        echo "Files to deploy:"
        ls -la
        echo "Total files count:"
        find . -type f | wc -l
    
    - name: Deploy to Hostinger Dev Subdomain
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps
        port: 21
        server-dir: /domains/studium.cat/public_html/dev/
        local-dir: ./
        log-level: verbose
        security: loose
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/vendor/**
